app = "flat-hunt-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  HISTORY_DB_PATH = "/data/history.sqlite"
  ANTHROPIC_MODEL = "claude-opus-4-6[1m]"
  MAX_AGENT_TURNS = "40"
  # Enables Claude Code's built-in stream watchdog that kills stuck tool
  # calls — workaround for the indefinite WebFetch hang bug. See
  # https://github.com/anthropics/claude-code/issues/34565
  CLAUDE_ENABLE_STREAM_WATCHDOG = "1"
  # Keep MCP tool results (e.g. Composio schemas) inline up to ~50k tokens
  # instead of offloading to disk, which forces Claude to go on filesystem
  # expeditions with Read/Grep. 50k is ~5% of the 1M Opus context.
  MAX_MCP_OUTPUT_TOKENS = "25000"
  MEMORY_PATH = "/data/memory.md"
  ATTACHMENTS_DIR = "/data/attachments"
  STREAM_INTERMEDIATE_TEXT = "false"
  TIMEZONE = "Europe/London"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "bot_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

# Long-polling: no public services, single machine.
[deploy]
  strategy = "immediate"
